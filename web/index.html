<!DOCTYPE html>
<html lang="en" data-auth-state="pending">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="CentrumChat - A modern, high-fidelity chat experience with responsive design, glassmorphism, and responsive messaging.">
  <title>CentrumChat - Connect Modernly</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="/styles/chat.css">
</head>
<body>

  <!-- APP SPLASH LOADER (FADES OUT AFTER INITIAL DATA LOAD) -->
  <div id="app-splash-loader" class="splash-loader-wrapper">
    <div class="splash-loader-content">
      <!-- Premium Logo / Icon -->
      <div class="splash-logo">
        <i class="bi bi-chat-text-fill"></i>
      </div>
      <!-- App Name -->
      <h4 class="splash-title">CentrumChat</h4>
      <!-- Subtitle -->
      <p class="splash-subtitle">Connecting team workspaces...</p>
      <!-- Animated Progress Bar -->
      <div class="splash-progress-container">
        <div class="splash-progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- Floating Ambient Blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- MAIN SPA WRAPPER -->
  <main id="app" class="container-fluid d-flex align-items-center justify-content-center p-0">
    <!-- App content will be mounted here dynamically by lime-csr-js -->
  </main>

  <!-- ═══════════════ ROOT TEMPLATE ═══════════════ -->
  <template id="tpl-app">
    <partial name="chat-card"></partial>
  </template>

  <!-- ═══════════════ MAIN CHAT CONTAINER ═══════════════ -->
  <template id="tpl-chat-card">
    <div class="glass-card {focusclass}" data-focusclass="focusModeClass">

      <!-- Top Chat Header -->
      <header class="chat-header">
        <!-- Logo / App Title -->
        <div class="d-flex align-items-center gap-2">
          <span class="fs-4">💬</span>
          <span class="fw-bold fs-5 d-none d-sm-inline" style="letter-spacing: -0.5px; color: var(--text-dark);">CentrumChat</span>
        </div>
        <!-- Center Header Section (To: Selector + Search Button) -->
        <div class="d-flex align-items-center gap-2">
          <!-- Destination Selector (To: [#Channel/@User]) -->
          <div class="dropdown">
            <div class="destination-container position-relative" id="channelDropdownSelector" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false" role="button" tabindex="0">
              <span class="destination-label">To:</span>
              <span class="destination-value" id="currentDestinationDisplay">
                <span data-text="activeDestLabel"></span> <i class="bi bi-chevron-down ms-1 small"></i>
              </span>
              <span class="badge rounded-pill bg-danger ms-2 {notifclass}" data-notifclass="headerNotifBadge.class" id="headerNotificationBadge" style="font-size: 0.68rem; padding: 4px 6px;" data-text="headerNotifBadge.text"></span>
            </div>

            <div class="dropdown-menu destination-dropdown-menu dropdown-menu-center mt-2" aria-labelledby="channelDropdownSelector" id="channelListDropdown">
              <!-- Tabs Navigation -->
              <ul class="nav nav-pills nav-pills-custom w-100 d-flex justify-content-between mb-3" id="destTabs" role="tablist" style="gap: 2px;">
                <li class="nav-item flex-fill text-center" role="presentation">
                  <button class="nav-link {channelsclass}" data-channelsclass="searchState.channelsClass" data-on-click="showChannelsTab" type="button" role="tab" style="font-size: 0.78rem;">
                    <i class="bi bi-hash"></i> Channels
                  </button>
                </li>
                <li class="nav-item flex-fill text-center" role="presentation">
                  <button class="nav-link {groupsclass}" data-groupsclass="searchState.groupsClass" data-on-click="showGroupsTab" type="button" role="tab" style="font-size: 0.78rem;">
                    <i class="bi bi-people-fill"></i> Groups
                  </button>
                </li>
                <li class="nav-item flex-fill text-center" role="presentation">
                  <button class="nav-link {usersclass}" data-usersclass="searchState.usersClass" data-on-click="showUsersTab" type="button" role="tab" style="font-size: 0.78rem;">
                    <i class="bi bi-at"></i> Users
                  </button>
                </li>
              </ul>

              <!-- Tabs Content. data-show (not <if data-live>) keeps the panels in the
                   DOM permanently: lime live blocks nested inline inside a live <if>
                   branch don't re-subscribe, while data-show is a plain element binding
                   and the panel lists stay fully reactive. -->
              <!-- Channels Panel -->
              <div class="tab-pane show active" role="tabpanel" data-show="searchState.showChannels">
                <div class="destination-list">
                  <for each="channels" as="chan" key="chan.slug" data-live data-diff="replace">
                    <a class="dropdown-item ${chan.activeClass}" href="#" data-on-click="selectChannel" data-id="${chan.slug}">
                      <i class="bi bi-hash text-primary"></i> ${chan.slug}
                      <if is-gt="chan.notifCount" than="0">
                        <span class="dest-notif-badge">${chan.notifCount}</span>
                      </if>
                    </a>
                  </for>
                </div>
              </div>

              <!-- Groups Panel -->
              <div class="tab-pane show active" role="tabpanel" data-show="searchState.showGroups">
                <div class="mb-2 d-flex gap-2 align-items-center">
                  <input type="text" class="form-control form-control-sm" placeholder="Search groups..." style="font-size: 0.8rem;" data-model="searchState.groupQuery">
                  <button class="btn btn-primary btn-sm px-2 d-flex align-items-center justify-content-center" data-on-click="openCreateGroup" style="border-radius: 8px; font-size: 0.8rem; height: 31px;" title="Create Group"><i class="bi bi-plus-lg"></i></button>
                </div>
                <div class="destination-list">
                  <for each="groups" as="g" key="g.id" data-live data-diff="replace">
                    <a class="dropdown-item ${g.activeClass}" href="#" data-on-click="selectGroup" data-id="${g.id}">
                      <div class="d-flex align-items-center justify-content-between w-100">
                        <span><i class="bi bi-people-fill text-info me-1"></i> ~ ${g.name}</span>
                        <div class="d-flex align-items-center gap-2">
                          <small class="text-muted" style="font-size: 0.72rem;">(${g.memberCount} members)</small>
                          <if is-gt="g.notifCount" than="0">
                            <span class="dest-notif-badge">${g.notifCount}</span>
                          </if>
                        </div>
                      </div>
                    </a>
                  </for>
                </div>
              </div>

              <!-- Users Panel -->
              <div class="tab-pane show active" role="tabpanel" data-show="searchState.showUsers">
                <div class="mb-2 position-relative">
                  <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted small" style="left: 12px;"></i>
                  <input type="text" class="form-control form-control-sm" placeholder="Search users..." style="font-size: 0.8rem; padding-left: 28px;" data-model="searchState.userQuery">
                </div>
                <div class="destination-list">
                  <for each="dms" as="u" key="u.id" data-live data-diff="replace">
                    <a class="dropdown-item ${u.activeClass}" href="#" data-on-click="selectDm" data-id="${u.id}">
                      <div class="d-flex align-items-center gap-2 w-100">
                        <div class="position-relative d-inline-block" style="width: 22px; height: 22px; flex-shrink: 0;">
                          <img loading="lazy" src="${u.avatarUrl}" alt="" class="rounded-circle" style="width: 22px; height: 22px; object-fit: cover;">
                          <span class="online-dot ${u.status} position-absolute" style="bottom: -2px; right: -2px; width: 8px; height: 8px; border: 1px solid #fff; border-radius: 50%; z-index: 1;"></span>
                        </div>
                        <span>@${u.username}</span>
                        <small class="text-muted">${u.displayName}</small>
                        <if is-gt="u.notifCount" than="0">
                          <span class="dest-notif-badge ms-auto">${u.notifCount}</span>
                        </if>
                      </div>
                    </a>
                  </for>
                </div>
              </div>
            </div>
          </div>

          <!-- Group Info Badge Container -->
          <if is-truthy="activeGroupBadge.visible" data-live>
            <button class="btn btn-sm btn-outline-info d-flex align-items-center gap-1 py-1 px-2 ms-1" data-on-click="openGroupMembers" style="border-radius: 20px; font-size: 0.76rem; height: 32px;" title="View members">
              <i class="bi bi-people-fill"></i> <span data-text="activeGroupBadge.memberCount"></span><span class="d-none d-sm-inline"> members</span>
            </button>
          </if>

          <!-- Search Toggle Button -->
          <button class="action-btn-circle" data-on-click="toggleSearch" title="Search messages" style="width:36px;height:36px;flex-shrink:0;">
            <i class="bi bi-search" style="font-size:0.85rem;"></i>
          </button>

          <!-- Unified activity inbox -->
          <button class="action-btn-circle activity-trigger ms-1" data-on-click="openActivityInbox" title="Open activity inbox" aria-label="Open activity inbox" style="width:36px;height:36px;flex-shrink:0;">
            <i class="bi bi-bell-fill" style="font-size:0.85rem;"></i>
            <span class="activity-trigger-badge {activitybadgeclass}" data-activitybadgeclass="activityHeaderBadge.class" data-text="activityHeaderBadge.text" aria-label="Unread activity">0</span>
          </button>

          <!-- Theme Toggle Button -->
          <button class="action-btn-circle ms-1" data-on-click="toggleTheme" title="Toggle dark/light mode" style="width:36px;height:36px;flex-shrink:0;">
            <i class="bi {themeicon}" data-themeicon="themeIcon" style="font-size:0.95rem;"></i>
          </button>

          <!-- Focus Mode Toggle Button -->
          <button class="action-btn-circle ms-1" data-on-click="toggleFocusMode" title="Focus mode: hide header and panels (Esc to exit)" aria-label="Enter focus mode" style="width:36px;height:36px;flex-shrink:0;">
            <i class="bi bi-arrows-fullscreen" style="font-size:0.85rem;"></i>
          </button>
        </div>

        <!-- User Profile Dropdown Navbar -->
        <div class="dropdown">
          <div class="profile-nav-dropdown-btn position-relative" id="profileDropdownBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false" role="button" tabindex="0" style="width: 38px; height: 38px; background: {avatarstyle}; background-size: cover; background-position: center;" data-avatarstyle="session.user.avatarStyle">
            <span class="online-dot {statusclass} position-absolute" data-statusclass="session.user.statusClass" style="bottom: 0; right: 0; width: 12px; height: 12px; border: 2px solid #fff; border-radius: 50%; z-index: 5;"></span>
          </div>

          <!-- User Profile Dropdown Card -->
          <div class="dropdown-menu dropdown-menu-end profile-nav-dropdown-menu mt-2" aria-labelledby="profileDropdownBtn">
             <div class="profile-card-header" style="background: {cover};" data-cover="session.user.coverStyle">
               <!-- Close button for mobile full screen -->
               <button class="btn btn-dark btn-sm bg-opacity-50 border-0 rounded-circle position-absolute d-md-none" data-on-click="closeProfileDropdown" style="top: 8px; left: 8px; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; z-index: 10;" title="Close Profile">
                 <i class="bi bi-x-lg text-white" style="font-size: 0.85rem;"></i>
               </button>
               <!-- Edit cover button overlay -->
               <button class="btn btn-dark btn-sm bg-opacity-50 border-0 rounded-circle position-absolute" data-on-click="openProfileImagesModal" style="top: 8px; right: 8px; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center;" title="Change Cover Image">
                 <i class="bi bi-camera text-white" style="font-size: 0.85rem;"></i>
               </button>
              <div class="profile-card-avatar-wrapper">
                <div class="profile-card-avatar" style="background: {avatarstyle}; background-size: cover; background-position: center;" data-avatarstyle="session.user.avatarStyle"></div>
                <!-- Edit avatar button overlay -->
                <button class="btn btn-primary btn-sm rounded-circle position-absolute" data-on-click="openProfileImagesModal" style="bottom: 0; right: 0; width: 26px; height: 26px; padding: 0; display: flex; align-items: center; justify-content: center; border: 2px solid #ffffff;" title="Change Profile Avatar">
                  <i class="bi bi-camera-fill text-white" style="font-size: 0.65rem;"></i>
                </button>
              </div>
            </div>
            <div class="profile-card-body">
              <if is-truthy="session.isEditingProfile" data-live>
                <div class="profile-editor-container mb-3 text-start">
                  <div class="mb-2">
                    <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.68rem; letter-spacing: 0.5px;">DISPLAY NAME</label>
                    <input type="text" class="form-control form-control-sm profile-edit-input" data-model="session.profileDraft.displayName" placeholder="Enter display name...">
                  </div>
                  <div class="mb-3">
                    <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.68rem; letter-spacing: 0.5px;">BIO</label>
                    <textarea class="form-control form-control-sm profile-edit-input" data-model="session.profileDraft.bio" rows="2" placeholder="Tell us about yourself..."></textarea>
                  </div>
                  <div class="d-flex gap-2">
                    <button class="profile-action-btn flex-grow-1" data-on-click="cancelProfileEdit">Cancel</button>
                    <button class="profile-action-btn primary flex-grow-1" data-on-click="saveProfileEdit">Save</button>
                  </div>
                </div>
                <else>
                  <div class="profile-card-name-row">
                    <div class="profile-card-username" data-text="session.user.displayName" style="color: {namecolor};" data-namecolor="session.user.nameColor"></div>
                    <span class="role-badge premium-badge" title="Premium Member" data-show="session.user.isPremium"><i class="bi bi-gem"></i></span>
                  </div>
                  <div class="profile-card-handle" data-text="session.user.handleDisplay"></div>

                  <p class="profile-card-bio" data-text="session.user.bio"></p>

                  <div class="mb-3">
                    <button class="profile-action-btn" data-on-click="startProfileEdit">
                      <i class="bi bi-pencil-square"></i> Edit Profile
                    </button>
                  </div>
                </else>
              </if>

              <!-- Status Selector Dropdown -->
              <div class="profile-status-row">
                <select class="form-select profile-status-select" data-model="session.user.status" title="Set your status">
                  <option value="online">🟢 Online</option>
                  <option value="idle">🟡 Idle</option>
                  <option value="dnd">🔴 Do Not Disturb</option>
                  <option value="offline">⚫ Offline</option>
                </select>
              </div>

              <div class="profile-card-date">
                <i class="bi bi-calendar-event"></i> Joined <span data-text="session.user.joinedDate"></span>
              </div>

              <!-- Statistics Grid -->
              <div class="profile-stats-grid">
                <div class="profile-stat-item">
                  <span class="profile-stat-val" data-text="session.user.messagesSent">0</span>
                  <span class="profile-stat-lbl">Messages</span>
                </div>
                <div class="profile-stat-item">
                  <span class="profile-stat-val" data-text="session.user.reactionsAdded">0</span>
                  <span class="profile-stat-lbl">Reacts</span>
                </div>
                <div class="profile-stat-item">
                  <span class="profile-stat-val" data-text="session.user.repliesMade">0</span>
                  <span class="profile-stat-lbl">Replies</span>
                </div>
              </div>

              <!-- Owner Actions -->
              <div class="profile-card-actions">
                <button class="profile-action-btn" data-on-click="rotateAvatarSeed">
                  <i class="bi bi-person-bounding-box"></i> Regenerate Avatar
                </button>
                <button class="profile-action-btn" data-on-click="openPreferences">
                  <i class="bi bi-gear-fill"></i> Preferences
                </button>
                <a href="/control-center" class="profile-action-btn text-decoration-none" data-show="session.user.isOperator">
                  <i class="bi bi-shield-lock-fill"></i> Control Center
                </a>
                <button class="profile-action-btn danger" data-on-click="handleLogout">
                  <i class="bi bi-box-arrow-right"></i> Sign Out
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <if is-truthy="accountSecurity.emailVerifiedAt" data-live>
        <else>
          <div class="mx-3 mt-3 alert alert-warning d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-0" role="alert" style="border-radius: 14px;">
            <div>
              <strong>Email verification required.</strong>
              <div class="small">
                Verify <span data-text="accountSecurity.email"></span> to send messages, create groups, react, search users, and upload media.
              </div>
              <if is-truthy="accountSecurity.pendingEmail" data-live>
                <div class="small mt-1">Pending new email: <span data-text="accountSecurity.pendingEmail"></span></div>
              </if>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-dark" data-on-click="openPreferences">Account Settings</button>
              <button class="btn btn-sm btn-primary" data-on-click="resendVerificationEmail">Resend Email</button>
            </div>
          </div>
        </else>
      </if>

      <!-- Search Bar (collapsible) -->
      <div class="search-bar-container {searchclass}" data-searchclass="searchState.barClass" id="searchBarContainer">
        <div class="position-relative">
          <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted" style="left:14px;"></i>
          <input type="text" class="form-control" id="messageSearchInput" placeholder="Search messages in this channel..." style="padding-left:38px; border-radius:12px; border:1px solid rgba(226,232,240,0.8); font-size:0.9rem;" data-model="searchState.messageQuery" data-on-keydown="handleSearchInputKeydown">
          <button class="btn btn-sm position-absolute top-50 translate-middle-y text-muted border-0 bg-transparent" data-on-click="clearMessageSearch" style="right:10px;"><i class="bi bi-x-lg"></i></button>
        </div>

        <!-- Recent searches (local-only, per account) -->
        <div class="search-history-panel" data-show="searchHistoryPanelVisible">
          <div class="search-history-head">
            <span class="search-history-title"><i class="bi bi-clock-history me-1"></i>Recent searches</span>
            <button class="search-history-clear" data-on-click="clearSearchHistory" title="Clear all recent searches">Clear all</button>
          </div>
          <div class="search-history-list">
            <for each="searchHistoryItems" as="h" key="h.q" data-live data-diff="replace">
              <div class="search-history-chip">
                <button type="button" class="search-history-btn" data-on-click="applySearchHistoryEntry" data-query="${h.q}" title="Search again">
                  <i class="bi bi-search"></i> ${h.q}
                </button>
                <button type="button" class="search-history-remove" data-on-click="removeSearchHistoryEntry" data-query="${h.q}" title="Remove from history" aria-label="Remove from search history">×</button>
              </div>
            </for>
          </div>
        </div>
      </div>

      <!-- Message pane stream -->
      <section class="message-pane" id="messageStream" aria-label="Message log">
        <for each="activeMessages" as="msg" key="msg.id" data-live data-diff="replace">
          <if is-truthy="msg.dateSeparator">
            <div class="date-separator">${msg.content}</div>
          </if>

          <if is-truthy="msg.system">
            <div class="system-message-row" id="msg_${msg.id}">
              <div class="system-message-badge">
                <i class="bi bi-info-circle-fill me-1"></i> <span>${msg.content}</span>
              </div>
            </div>
          </if>

          <if is-truthy="msg.isNormal">
            <div class="message-group ${msg.groupClass}" id="group_${msg.id}">
              <div class="message-meta">
                <span class="username" data-on-click="viewUserProfile" data-user-id="${msg.authorId}" style="color: ${msg.userColor}; font-weight: 700;">${msg.displayName}</span>
                <if is-truthy="msg.isPremium">
                  <span class="role-badge premium-badge" title="Premium Member"><i class="bi bi-gem"></i></span>
                </if>
                <if is-truthy="msg.isGroupOwner">
                  <span class="role-badge group-owner-badge" title="Group Owner"><i class="bi bi-crown-fill"></i></span>
                </if>
                <span class="timestamp">${msg.timestamp}</span>
              </div>

              <div class="message-bubble-wrapper reaction-trigger-area">
                <div class="message-bubble">
                  <if is-truthy="msg.replyTo">
                    <div class="reply-preview-bubble" data-on-click="scrollToMessage" data-target-id="${msg.replyTo}">
                      <div class="reply-sender">${msg.replyToUser}</div>
                      <div class="text-truncate">${msg.replyToText}</div>
                    </div>
                  </if>

                  <div>
                    <span>${msg.content}</span>
                    <if is-truthy="msg.edited">
                      <span class="edited-tag">(edited)</span>
                    </if>
                  </div>

                  <if is-truthy="msg.hasAttachment">
                    <if is-truthy="msg.attachmentIsImage">
                      <div class="image-preview-container">
                        <img loading="lazy" src="${msg.attachmentUrl}" alt="${msg.attachmentName}" data-on-click="openLightbox" style="cursor:zoom-in;">
                      </div>
                      <else>
                        <a href="${msg.attachmentUrl}" download="${msg.attachmentName}" class="attachment-chip">
                          <span class="d-flex align-items-center gap-2">
                            <i class="bi ${msg.attachmentFileIconClass} fs-5"></i>
                            <span class="filename">${msg.attachmentName}</span>
                          </span>
                          <span class="filesize">${msg.attachmentSizeFormatted}</span>
                        </a>
                      </else>
                    </if>
                  </if>
                  <if is-truthy="msg.hasAttachment">
                    <button class="btn btn-sm btn-link text-muted p-0 mt-1" data-on-click="reportAttachment" data-id="${msg.attachment.id}">
                      Report attachment
                    </button>
                  </if>
                </div>

                <div class="message-bubble-actions">
                  <button class="bubble-action-btn" data-on-click="showMsgReactionPicker" data-id="${msg.id}" title="React">
                    <i class="bi bi-emoji-smile"></i>
                  </button>
                  <button class="bubble-action-btn" data-on-click="startReply" data-id="${msg.id}" title="Reply">
                    <i class="bi bi-reply-fill"></i>
                  </button>
                  <button class="bubble-action-btn" data-on-click="reportMessage" data-id="${msg.id}" title="Report">
                    <i class="bi bi-flag"></i>
                  </button>
                  <if is-truthy="msg.isOutgoing">
                    <button class="bubble-action-btn" data-on-click="startEditMsg" data-id="${msg.id}" title="Edit">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button class="bubble-action-btn" data-on-click="deleteMsg" data-id="${msg.id}" title="Delete">
                      <i class="bi bi-trash"></i>
                    </button>
                  </if>
                </div>
              </div>

              <if is-truthy="msg.hasReactions">
                <div class="reactions-badge-container">
                  <for each="msg.reactionBadges" as="react">
                    <div class="reaction-badge ${react.activeClass}" data-on-click="toggleReaction" data-msg-id="${msg.id}" data-emoji="${react.emoji}">
                      <span>${react.emoji}</span>
                      <span>${react.count}</span>
                    </div>
                  </for>
                </div>
              </if>
            </div>
          </if>
        </for>
      </section>

      <!-- Typing indicator -->
      <div class="typing-indicator-bar {typingclass}" data-typingclass="typingState.class" id="typingIndicator">
        <span class="typing-avatar" style="width: 20px; height: 20px; display: inline-block;">
          <div style="width:100%; height:100%; border-radius:50%; background: {avatarstyle}; background-size: cover; background-position: center;" data-avatarstyle="typingState.avatarStyle"></div>
        </span>
        <span class="typing-text" data-text="typingState.text"></span>
        <span class="typing-dots"><span></span><span></span><span></span></span>
      </div>

      <!-- Reply context bar above input -->
      <div id="replyContextBar" class="input-reply-context {replyclass}" data-replyclass="replyContextState.class">
        <div class="context-details">
          <i class="bi bi-reply-fill text-primary"></i> <span data-text="replyContextState.title"></span>:
          <span class="text-muted" data-text="replyContextState.text"></span>
        </div>
        <button class="close-context" data-on-click="cancelReply" title="Cancel reply">×</button>
      </div>

      <!-- Attachment preview bar above input -->
      <for each="attachedFilePreview" as="preview" key="preview.url" data-live data-diff="replace">
        <div id="attachmentPreviewBar" class="input-attachment-context">
          <div class="context-details d-flex align-items-center gap-2">
            <if is-truthy="preview.isImage">
              <div class="attachment-preview-thumb" style="background-image: url('${preview.url}'); background-size: cover; background-position: center; width: 36px; height: 36px; border-radius: 6px; border: 1px solid #d4d4d8;"></div>
              <else>
                <i class="bi bi-file-earmark-text-fill text-primary fs-5"></i>
              </else>
            </if>
            <div class="d-flex flex-column text-start">
              <span class="filename fw-semibold" style="font-size: 0.82rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${preview.name}</span>
              <span class="filesize text-muted" style="font-size: 0.72rem;">${preview.sizeFormatted}</span>
            </div>
          </div>
          <button class="close-context" data-on-click="clearAttachedFile" title="Remove attachment">×</button>
        </div>
      </for>

      <!-- Compose Footer area -->
      <footer class="chat-footer">
        <!-- Attachment button -->
        <button class="action-btn-circle" data-on-click="triggerFileAttach" title="Share an attachment">
          <i class="bi bi-paperclip fs-5"></i>
        </button>

        <!-- Message composer textarea -->
        <textarea class="compose-textarea" id="messageInput" rows="1" placeholder="Write your message here... (Enter to send)" data-model="chatForm.messageInput" data-on-keydown="handleMessageInputKeydown" aria-label="Write a message"></textarea>

        <!-- Emoji picker toggle -->
        <button class="action-btn-circle" id="emojiToggleBtn" data-on-click="toggleEmojiPicker" title="Add emoji">
          <i class="bi bi-emoji-smile fs-5"></i>
        </button>

        <!-- Send message button -->
        <button class="action-btn-circle btn-send" data-on-click="handleSendMessage" title="Send message">
          <i class="bi bi-send-fill fs-5"></i>
        </button>
      </footer>

      <!-- Dynamic emoji popover container -->
      <div class="emoji-picker-popover" id="emojiPopoverContainer"></div>

      <!-- Scroll to bottom FAB -->
      <button class="scroll-bottom-fab d-none" id="scrollBottomFab" data-on-click="scrollToBottom" title="Scroll to latest">
        <i class="bi bi-chevron-double-down"></i>
        <span class="scroll-fab-badge {fabbadgeclass}" data-fabbadgeclass="scrollFabBadgeClass" data-text="scrollFabBadgeText" id="scrollFabBadge" aria-label="New messages below">0</span>
      </button>

      <!-- Focus mode visible exit control (shown only while focus mode is active) -->
      <button class="focus-exit-btn" data-show="focusMode" data-on-click="toggleFocusMode" title="Exit focus mode (Esc)" aria-label="Exit focus mode">
        <i class="bi bi-arrows-angle-contract"></i><span class="focus-exit-label">Exit focus</span>
      </button>
    </div>

    <!-- ==================================================== -->
    <!-- UNIFIED ACTIVITY INBOX                              -->
    <!-- ==================================================== -->
    <div class="modal fade" id="activityInboxModal" tabindex="-1" aria-labelledby="activityInboxTitle" aria-describedby="activityInboxDescription" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable activity-inbox-dialog">
        <div class="modal-content modal-content-custom activity-inbox-card">
          <div class="modal-header activity-inbox-header">
            <div>
              <h2 class="modal-title fs-5" id="activityInboxTitle">Activity</h2>
              <p class="mb-0" id="activityInboxDescription">Mentions, messages, reactions and invitations in one place.</p>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close activity inbox"></button>
          </div>

          <div class="modal-body activity-inbox-body">
            <div class="activity-filter-bar" aria-label="Filter activity">
              <button type="button" class="activity-filter-btn {allfilterclass}" data-allfilterclass="activityInbox.allFilterClass" data-on-click="filterActivity" data-filter="all">All</button>
              <button type="button" class="activity-filter-btn {unreadfilterclass}" data-unreadfilterclass="activityInbox.unreadFilterClass" data-on-click="filterActivity" data-filter="unread">Unread</button>
              <button type="button" class="activity-filter-btn {mentionsfilterclass}" data-mentionsfilterclass="activityInbox.mentionsFilterClass" data-on-click="filterActivity" data-filter="mentions">Mentions &amp; replies</button>
              <button type="button" class="activity-filter-btn {reactionsfilterclass}" data-reactionsfilterclass="activityInbox.reactionsFilterClass" data-on-click="filterActivity" data-filter="reactions">Reactions</button>
              <button type="button" class="activity-filter-btn {invitesfilterclass}" data-invitesfilterclass="activityInbox.invitesFilterClass" data-on-click="filterActivity" data-filter="invites">Invitations</button>
            </div>

            <div class="activity-toolbar">
              <div class="activity-toolbar-primary">
                <button type="button" class="activity-toolbar-btn" data-on-click="toggleVisibleActivitySelection" data-show="activityInbox.hasItems">
                  <i class="bi bi-check2-square"></i> Select visible
                </button>
                <button type="button" class="activity-toolbar-btn" data-on-click="markAllActivityRead" data-show="activityInbox.hasUnread">
                  <i class="bi bi-envelope-open"></i> Mark all read
                </button>
              </div>
              <div class="activity-toolbar-danger">
                <button type="button" class="activity-toolbar-btn danger" data-on-click="deleteSelectedActivity" data-show="activityInbox.hasSelection">
                  <i class="bi bi-trash3"></i> Delete selected
                </button>
                <button type="button" class="activity-toolbar-btn danger" data-on-click="deleteAllActivity" data-show="activityInbox.hasAny">
                  Delete all
                </button>
              </div>
            </div>

            <div class="activity-selection-status" data-text="activityInbox.selectedText" aria-live="polite">No activity selected</div>

            <div class="activity-error" data-show="activityInbox.hasError" role="alert">
              <span data-text="activityInbox.error"></span>
              <button type="button" data-on-click="retryActivityInbox">Try again</button>
            </div>

            <div class="activity-loading" data-show="activityInbox.showLoading" role="status" aria-live="polite">
              <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
              Loading activity…
            </div>

            <div class="activity-empty" data-show="activityInbox.showEmpty" role="status" aria-live="polite">
              <i class="bi bi-inbox" aria-hidden="true"></i>
              <span data-text="activityInbox.emptyText"></span>
            </div>

            <div class="activity-list" data-show="activityInbox.hasItems">
              <for each="activityItems" as="item" key="item.id" data-live data-diff="replace">
                <article class="activity-row ${item.rowClass} ${item.selectionClass}">
                  <button type="button" class="activity-select-toggle ${item.selectionClass}" data-on-click="toggleActivitySelection" data-notification-id="${item.id}" aria-pressed="${item.selectionAria}" aria-label="${item.selectionLabel}">
                    <i class="bi ${item.selectionIcon}" aria-hidden="true"></i>
                  </button>
                  <div class="activity-type-icon" aria-hidden="true">
                    <i class="bi ${item.icon}"></i>
                  </div>
                  <div class="activity-copy">
                    <div class="activity-title-row">
                      <h3>${item.title}</h3>
                      <if is-truthy="item.isRead">
                        <else>
                          <span class="activity-unread-label">Unread</span>
                        </else>
                      </if>
                    </div>
                    <p>${item.description}</p>
                    <time datetime="${item.createdAt}">${item.timeLabel}</time>
                  </div>
                  <button type="button" class="activity-open-btn" data-on-click="openActivityItem" data-notification-id="${item.id}" aria-label="${item.openLabel}">
                    <span>${item.actionText}</span><i class="bi bi-chevron-right" aria-hidden="true"></i>
                  </button>
                </article>
              </for>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================================================== -->
    <!-- VISITOR / OTHER USER PROFILE MODAL                 -->
    <!-- ==================================================== -->
    <div class="modal fade" id="visitorProfileModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable visitor-profile-dialog">
        <div class="modal-content visitor-profile-card">
          <!-- Cover Banner -->
          <div class="visitor-cover-banner" style="background: {cover};" data-cover="visitorProfile.coverStyle">
            <button type="button" class="btn-close position-absolute" data-bs-dismiss="modal" aria-label="Close" style="top: 16px; right: 16px; z-index: 10; filter: invert(1) grayscale(1) brightness(2) !important;"></button>

            <!-- Header Inside Cover Banner -->
            <div class="visitor-header-row w-100">
              <div class="visitor-avatar-container">
                <div class="visitor-avatar-img" style="background: {avatarstyle}; background-size: cover; background-position: center;" data-avatarstyle="visitorProfile.avatarStyle"></div>
                <span class="visitor-status-badge pulse-effect" style="background-color: {statuscolor}; --pulse-glow: {statusglow};" data-statuscolor="visitorProfile.statusColor" data-statusglow="visitorProfile.statusGlow"></span>
              </div>
              <div class="visitor-name-stack">
                <div class="d-flex align-items-center flex-wrap gap-2">
                  <div class="visitor-display-name" style="color: {namecolor};" data-namecolor="visitorProfile.nameColor">
                    <span data-text="visitorProfile.displayName"></span>
                    <if is-truthy="visitorProfile.isPremium" data-live>
                      <span class="role-badge premium-badge" title="Premium Member"><i class="bi bi-gem"></i></span>
                    </if>
                  </div>
                  <span class="visitor-status-badge-lbl {statusbadgeclass}" data-statusbadgeclass="visitorProfile.statusBadgeClass" data-text="visitorProfile.statusText">Online</span>
                </div>
                <div class="d-flex align-items-center flex-wrap gap-1 mt-1">
                  <span class="visitor-handle" data-text="visitorProfile.handleDisplay"></span>
                  <span class="visitor-dot-separator text-muted px-1">•</span>
                  <span class="visitor-joined-text">
                    <i class="bi bi-calendar-event me-1"></i>Joined <span data-text="visitorProfile.joinedDate"></span>
                  </span>
                </div>
              </div>
            </div>
          </div>

          <div class="modal-body visitor-body position-relative">
            <!-- Bio Section -->
            <div class="visitor-bio-section">
              <div class="visitor-section-label">About</div>
              <p class="visitor-bio" data-text="visitorProfile.bio"></p>
            </div>

            <!-- Stats Grid -->
            <div class="visitor-stats-grid">
              <div class="visitor-stat-card">
                <div class="visitor-stat-lbl">MESSAGES</div>
                <div class="visitor-stat-val" data-text="visitorProfile.messagesSent">0</div>
              </div>
              <div class="visitor-stat-card">
                <div class="visitor-stat-lbl">REACTIONS</div>
                <div class="visitor-stat-val" data-text="visitorProfile.reactionsAdded">0</div>
              </div>
              <div class="visitor-stat-card">
                <div class="visitor-stat-lbl">REPLIES</div>
                <div class="visitor-stat-val" data-text="visitorProfile.repliesMade">0</div>
              </div>
            </div>

            <!-- Shared Groups (data-show wrapper — see the tab panels note above) -->
            <div class="visitor-mutual-groups" data-show="visitorProfile.hasMutualGroups">
              <div class="visitor-section-label">SHARED GROUPS</div>
              <div class="visitor-mutual-list">
                <for each="visitorProfile.mutualGroups" as="mut" key="mut.id" data-live data-diff="replace">
                  <span class="visitor-group-chip">${mut.name}</span>
                </for>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="visitor-actions">
              <if is-truthy="visitorProfile.isSelf" data-live>
                <button class="visitor-action-primary" data-on-click="openPrefsFromProfile" data-bs-dismiss="modal">
                  <i class="bi bi-gear-fill"></i> Edit Preferences
                </button>
                <button class="visitor-action-secondary" data-on-click="openProfileImagesFromProfile" data-bs-dismiss="modal">
                  <i class="bi bi-image"></i> Edit Graphics
                </button>
                <else>
                  <button class="visitor-action-primary" data-on-click="messageUserFromProfile" data-bs-dismiss="modal">
                    <i class="bi bi-chat-fill"></i> Message
                  </button>
                  <button class="visitor-action-secondary" data-on-click="mentionUserFromProfile" data-bs-dismiss="modal">
                    <i class="bi bi-at"></i> Mention
                  </button>
                  <button class="visitor-action-secondary" data-on-click="toggleBlockFromProfile">
                    <i class="bi bi-slash-circle"></i> Block
                  </button>
                  <button class="visitor-action-secondary" data-on-click="unblockFromProfile">
                    <i class="bi bi-check-circle"></i> Unblock
                  </button>
                  <button class="visitor-action-secondary" data-on-click="reportUserFromProfile">
                    <i class="bi bi-flag"></i> Report
                  </button>
                </else>
              </if>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PROFILE IMAGES UPDATE MODAL -->
    <div class="modal fade" id="profileImagesModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width: 380px;">
        <div class="modal-content modal-content-custom">
          <div class="modal-header border-0 pb-0 pt-3 px-3">
            <h5 class="modal-title fw-bold fs-6" style="color: var(--text-dark);">Update Profile Graphics</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body profile-card-body pt-2 pb-3 px-3">
            <!-- Avatar Section -->
            <div class="mb-3 text-start">
              <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">PROFILE AVATAR</label>
              <input type="file" class="form-control form-control-sm mb-2" id="avatarFileInput" accept="image/*" data-on-change="handleAvatarFileSelect">
            </div>

            <!-- Cover Section -->
            <div class="mb-4 text-start">
              <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">COVER BACKGROUND</label>
              <input type="file" class="form-control form-control-sm mb-2" id="coverFileInput" accept="image/*" data-on-change="handleCoverFileSelect">
            </div>

            <!-- Save / Cancel -->
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-secondary flex-grow-1 py-2" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-sm btn-primary flex-grow-1 py-2" data-on-click="saveProfileGraphics">Apply Changes</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CREATE GROUP MODAL -->
    <div class="modal fade" id="createGroupModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width: 400px;">
        <div class="modal-content modal-content-custom">
          <div class="modal-header border-0 pb-0 pt-3 px-3">
            <h5 class="modal-title fw-bold fs-6" style="color: var(--text-dark);"><i class="bi bi-people-fill me-1"></i> Create New Group</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-2 pb-3 px-3">
            <div class="mb-3 text-start">
              <label for="newGroupNameInput" class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">GROUP NAME</label>
              <input type="text" class="form-control form-control-sm" id="newGroupNameInput" placeholder="Enter group name (e.g. Project Alpha)..." data-model="createGroupForm.name" required>
            </div>

            <div class="mb-3 text-start">
              <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">SELECT MEMBERS (3 to 25 people)</label>
              <div class="border rounded p-2" style="max-height: 180px; overflow-y: auto; background: var(--bg-light);">
                <for each="createGroupForm.candidateUsers" as="cand" key="cand.id" data-live data-diff="replace">
                  <div class="form-check text-start mb-1">
                    <input class="form-check-input" type="checkbox" value="${cand.id}" data-on-change="toggleGroupMemberSelection" id="chk_member_${cand.id}">
                    <label class="form-check-label small" for="chk_member_${cand.id}">
                      <img loading="lazy" src="${cand.avatarUrl}" alt="" class="rounded-circle me-1" style="width: 18px; height: 18px; object-fit: cover;">
                      @${cand.username} (${cand.displayName})
                    </label>
                  </div>
                </for>
              </div>
              <div class="form-text text-muted" style="font-size: 0.7rem;">Minimum 2 other members required.</div>
            </div>

            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-secondary flex-grow-1 py-2" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-sm btn-primary flex-grow-1 py-2" data-on-click="submitCreateGroup">Create Group</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- GROUP MEMBERS MODAL -->
    <div class="modal fade" id="groupMembersModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width: 400px;">
        <div class="modal-content modal-content-custom">
          <div class="modal-header border-0 pb-0 pt-3 px-3">
            <h5 class="modal-title fw-bold fs-6" style="color: var(--text-dark);"><i class="bi bi-people-fill me-1"></i> Group Participants</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-2 pb-3 px-3">
            <div class="mb-3 text-start" style="max-height: 200px; overflow-y: auto;">
              <for each="groupMembersForm.members" as="mem" key="mem.id" data-live data-diff="replace">
                <div class="group-member-row d-flex align-items-center gap-2 mb-2 w-100 pb-2 member-item-border" data-on-click="viewUserProfileFromGroup" data-user-id="${mem.id}" title="View profile">
                  <img loading="lazy" src="${mem.avatarUrl}" alt="" class="rounded-circle flex-shrink-0" style="width: 28px; height: 28px; object-fit: cover;">
                  <div class="d-flex flex-column flex-grow-1 overflow-hidden">
                    <span class="small fw-bold text-truncate d-inline-flex align-items-center">
                      ${mem.displayName}
                      <if is-truthy="mem.isPremium">
                        <span class="role-badge premium-badge" title="Premium Member"><i class="bi bi-gem"></i></span>
                      </if>
                    </span>
                    <span class="text-muted text-truncate" style="font-size:0.75rem;">
                      @${mem.username}
                      <if is-truthy="mem.isOwner">
                        <span class="badge bg-secondary py-0 px-1 ms-1" style="font-size: 0.7rem;">Owner</span>
                      </if>
                    </span>
                  </div>
                  <i class="bi bi-chevron-right group-member-chevron"></i>
                  <if is-truthy="mem.canKick">
                    <button class="btn btn-outline-danger py-0 px-1 kick-member-btn" data-on-click="kickGroupMember" data-user-id="${mem.id}" style="font-size:0.7rem; border-radius:4px;">Kick</button>
                  </if>
                </div>
              </for>
            </div>

            <!-- Add New Member Area -->
            <if is-truthy="groupMembersForm.canAddMembers" data-live>
              <div class="mb-3 border-top pt-3 text-start">
                <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">ADD MEMBER</label>
                <div class="d-flex gap-2">
                  <select class="form-select form-select-sm" id="newGroupMemberSelect" style="font-size: 0.8rem;"></select>
                  <button class="btn btn-sm btn-primary px-3" data-on-click="submitAddGroupMember">Add</button>
                </div>
              </div>
            </if>

            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-danger flex-grow-1 py-2" data-on-click="leaveGroup">Leave Group</button>
              <button class="btn btn-sm btn-light flex-grow-1 py-2" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DELETE MESSAGE CONFIRMATION MODAL -->
    <div class="modal fade" id="deleteMessageConfirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content confirm-modal-card">
          <div class="modal-body p-4 text-center">
            <div class="confirm-modal-icon mb-3">
              <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 2rem;"></i>
            </div>
            <h5 class="confirm-modal-title mb-2">Delete Message</h5>
            <p class="confirm-modal-text mb-4">Are you sure you want to delete this message? This action cannot be undone.</p>
            <div class="d-flex gap-2 justify-content-center">
              <button type="button" class="btn btn-secondary confirm-modal-btn cancel" data-bs-dismiss="modal">Cancel</button>
              <button type="button" class="btn btn-danger confirm-modal-btn confirm" data-on-click="confirmDeleteMsg">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- UPLOAD ATTACHMENT MODAL -->
    <div class="modal fade" id="uploadAttachmentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 440px;">
        <div class="modal-content upload-modal-card">
          <div class="modal-header border-0 pb-0 pt-3 px-3">
            <h5 class="modal-title fw-bold fs-6"><i class="bi bi-cloud-upload-fill me-2"></i> Upload Attachment</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <!-- Tabs (File Upload / Paste URL) -->
            <ul class="nav nav-tabs nav-tabs-custom mb-3" id="uploadTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-upload-file" data-bs-toggle="tab" data-bs-target="#panel-upload-file" type="button" role="tab" style="font-size: 0.8rem;">File Upload</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-upload-url" data-bs-toggle="tab" data-bs-target="#panel-upload-url" type="button" role="tab" style="font-size: 0.8rem;">Paste URL</button>
              </li>
            </ul>

            <div class="tab-content" id="uploadTabContent">
              <!-- File Upload Panel -->
              <div class="tab-pane fade show active" id="panel-upload-file" role="tabpanel">
                <div class="drag-drop-zone" id="dropZone">
                  <i class="bi bi-file-earmark-arrow-up text-muted display-6 mb-2"></i>
                  <p class="mb-1 fw-semibold text-center" style="font-size: 0.85rem;">Drag & drop your file here</p>
                  <p class="text-muted mb-3" style="font-size: 0.72rem;">or</p>
                  <button class="btn btn-sm btn-primary py-1.5 px-3" data-on-click="clickHiddenUploadInput">Select File</button>
                  <input type="file" id="modalFileInput" class="d-none">
                </div>
              </div>

              <!-- Paste URL Panel -->
              <div class="tab-pane fade" id="panel-upload-url" role="tabpanel">
                <div class="url-upload-zone">
                  <div class="mb-3">
                    <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.68rem; letter-spacing: 0.5px;">IMAGE OR FILE URL</label>
                    <div class="input-group">
                      <input type="text" class="form-control form-control-sm upload-url-input" id="uploadUrlInput" placeholder="https://example.com/image.png">
                      <button class="btn btn-primary btn-sm px-3" data-on-click="uploadFromUrl">Upload</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Uploading progress & status overlay (hidden by default) -->
            <div class="upload-status-container d-none" id="uploadStatusContainer">
              <div class="upload-progress-card text-center p-3">
                <!-- Progress state -->
                <div class="upload-state-working">
                  <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div>
                  <p class="small fw-semibold mb-1 upload-status-message">Uploading file...</p>
                  <div class="progress mb-1" style="height: 6px; border-radius: 3px; background: rgba(0,0,0,0.05);">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;" id="uploadProgressBar"></div>
                  </div>
                  <span class="small text-muted" id="uploadProgressPercent" style="font-size: 0.72rem;">0%</span>
                </div>

                <!-- Success state -->
                <div class="upload-state-success d-none" id="uploadStateSuccess">
                  <i class="bi bi-check-circle-fill text-success display-6 mb-2"></i>
                  <p class="small fw-bold text-success mb-0">Upload Complete!</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PREFERENCES MODAL -->
    <div class="modal fade" id="preferencesModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width: 500px;">
        <div class="modal-content modal-content-custom">
          <div class="modal-header border-0 pb-0 pt-3 px-3">
            <h5 class="modal-title fw-bold fs-6" style="color: var(--text-dark);"><i class="bi bi-gear-fill me-1"></i> Preferences</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-2 pb-3 px-3">
            <!-- Inner Nav Tabs -->
            <ul class="nav nav-tabs nav-tabs-custom mb-3" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link {appearanceclass}" data-appearanceclass="preferencesForm.appearanceTabClass" data-on-click="showPrefAppearanceTab" type="button" role="tab" style="font-size: 0.8rem;">
                  🎨 Appearance
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link {privacyclass}" data-privacyclass="preferencesForm.privacyTabClass" data-on-click="showPrefPrivacyTab" type="button" role="tab" style="font-size: 0.8rem;">
                  🔒 Privacy
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link {securityclass}" data-securityclass="preferencesForm.securityTabClass" data-on-click="showPrefSecurityTab" type="button" role="tab" style="font-size: 0.8rem;">
                  🔑 Security
                </button>
              </li>
            </ul>

            <if is-eq="preferencesForm.activeTab" to="appearance" data-live="preferencesForm.activeTab">
              <!-- Appearance Tab Panel -->
              <div class="tab-pane show active" role="tabpanel">
                <div class="mb-3 text-start">
                  <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">THEME</label>
                  <div class="d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary {lightthemeclass}" data-lightthemeclass="preferencesForm.lightThemeClass" data-on-click="setPrefThemeLight" style="border-radius: 8px;">
                      <i class="bi bi-sun-fill"></i> Light
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-secondary {darkthemeclass}" data-darkthemeclass="preferencesForm.darkThemeClass" data-on-click="setPrefThemeDark" style="border-radius: 8px;">
                      <i class="bi bi-moon-stars-fill"></i> Dark
                    </button>
                  </div>
                </div>

                <div class="mb-3 text-start">
                  <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">NAME COLOR</label>
                  <div class="d-flex align-items-center gap-2 mb-2">
                    <input type="color" class="form-control-color border-0 p-0" data-model="preferencesForm.nameColor" style="width: 32px; height: 32px; cursor: pointer; border-radius: 50%;">
                    <span class="small text-muted font-monospace" data-text="preferencesForm.nameColor">#0284c7</span>
                  </div>
                </div>

                <div class="mb-3 text-start">
                  <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">PREMIUM STATUS</label>
                  <div class="form-check form-switch text-start">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefPremiumToggle" data-model="preferencesForm.isPremium">
                    <label class="form-check-label small text-muted" for="prefPremiumToggle">Show Premium Badge 💎 next to my name</label>
                  </div>
                </div>

                <div class="p-2 border rounded mb-2 bg-light text-center" style="border-radius: 8px;">
                  <div class="small fw-bold text-muted mb-1" style="font-size: 0.65rem;">LIVE NAME PREVIEW</div>
                  <div class="d-flex justify-content-around p-2 gap-2" style="background: transparent;">
                    <div class="p-2 flex-grow-1 rounded text-center border bg-white" style="font-size: 0.85rem;">
                      <span style="font-weight: 700; color: {prefcolor};" data-prefcolor="preferencesForm.nameColor" data-text="session.user.usernameDisplay">@Username</span>
                      <div class="text-muted mt-1" style="font-size:0.6rem; color: #64748b !important;">Light BG</div>
                    </div>
                    <div class="p-2 flex-grow-1 rounded text-center border bg-dark" style="font-size: 0.85rem;">
                      <span style="font-weight: 700; color: {prefcolor};" data-prefcolor="preferencesForm.nameColor" data-text="session.user.usernameDisplay">@Username</span>
                      <div class="text-muted mt-1" style="font-size:0.6rem; color: #94a3b8 !important;">Dark BG</div>
                    </div>
                  </div>
                </div>
              </div>
            </if>

            <if is-eq="preferencesForm.activeTab" to="privacy" data-live="preferencesForm.activeTab">
              <!-- Privacy Tab Panel -->
              <div class="tab-pane show active" role="tabpanel">
                <div class="mb-3 text-start">
                  <label class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">NOTIFICATION SETTINGS</label>
                  <div class="form-check form-switch text-start mb-2">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefSoundToggle" data-model="preferencesForm.sound">
                    <label class="form-check-label small" for="prefSoundToggle">Enable incoming message sounds</label>
                  </div>
                  <div class="form-check form-switch text-start">
                    <input class="form-check-input" type="checkbox" role="switch" id="prefDesktopToggle" data-model="preferencesForm.desktopNotif">
                    <label class="form-check-label small" for="prefDesktopToggle">Enable desktop push notifications</label>
                  </div>
                </div>

                <div class="mb-3 text-start">
                  <label for="prefDmPrivacy" class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">WHO CAN SEND YOU DIRECT MESSAGES</label>
                  <select class="form-select form-select-sm" data-model="preferencesForm.dmPrivacy" style="font-size: 0.85rem; border-radius: 8px;">
                    <option value="everyone">🌐 Everyone</option>
                    <option value="group_members">👥 Only members of my groups</option>
                    <option value="no_one">🚫 No one</option>
                  </select>
                </div>

                <div class="mb-3 text-start">
                  <label for="prefGroupPrivacy" class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">WHO CAN ADD YOU TO GROUP CHATS</label>
                  <select class="form-select form-select-sm" data-model="preferencesForm.groupPrivacy" style="font-size: 0.85rem; border-radius: 8px;">
                    <option value="everyone">🌐 Everyone</option>
                    <option value="dm_contacts">💬 Only contacts I have messaged</option>
                    <option value="no_one">🚫 No one</option>
                  </select>
                </div>
              </div>
            </if>

            <if is-eq="preferencesForm.activeTab" to="security" data-live="preferencesForm.activeTab">
              <!-- Security Tab Panel -->
              <div class="tab-pane show active" role="tabpanel">
                <div class="border rounded p-3 mb-3 text-start pref-section-card">
                  <div class="small fw-bold text-muted mb-2" style="font-size: 0.72rem; letter-spacing: 0.5px;">EMAIL STATUS</div>
                  <div class="small mb-1">Current: <span class="fw-semibold" data-text="accountSecurity.email"></span></div>
                  <if is-truthy="accountSecurity.emailVerifiedAt" data-live>
                    <div class="small text-success">Verified</div>
                    <else>
                      <div class="small text-warning mb-2">Verification required</div>
                      <button type="button" class="btn btn-sm btn-outline-primary" data-on-click="resendVerificationEmail">Resend verification email</button>
                    </else>
                  </if>
                  <if is-truthy="accountSecurity.pendingEmail" data-live>
                    <div class="small mt-2">Pending new email: <span class="fw-semibold" data-text="accountSecurity.pendingEmail"></span></div>
                  </if>
                </div>
                <div class="mb-2 text-start">
                  <label for="prefCurrentPassword" class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">CURRENT PASSWORD</label>
                  <input type="password" class="form-control form-control-sm" id="prefCurrentPassword" placeholder="Enter current password..." style="font-size: 0.85rem; border-radius: 8px;" data-model="preferencesForm.currentPassword" autocomplete="current-password">
                </div>
                <div class="mb-2 text-start">
                  <label for="prefNewPassword" class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">NEW PASSWORD (min 8 characters)</label>
                  <input type="password" class="form-control form-control-sm" id="prefNewPassword" placeholder="Enter new password..." style="font-size: 0.85rem; border-radius: 8px;" data-model="preferencesForm.newPassword" autocomplete="new-password">
                </div>
                <div class="mb-3 text-start">
                  <label for="prefConfirmPassword" class="form-label small fw-bold text-muted mb-1" style="font-size: 0.72rem; letter-spacing: 0.5px;">CONFIRM NEW PASSWORD</label>
                  <input type="password" class="form-control form-control-sm" id="prefConfirmPassword" placeholder="Confirm new password..." style="font-size: 0.85rem; border-radius: 8px;" data-model="preferencesForm.confirmPassword" autocomplete="new-password">
                </div>
                <button type="button" class="btn btn-sm btn-outline-danger w-100 py-2 mb-3" data-on-click="updatePassword" style="border-radius: 8px;">
                  <i class="bi bi-key-fill me-1"></i> Update Security Password
                </button>

                <div class="border rounded p-3 mb-3 text-start pref-section-card">
                  <div class="small fw-bold text-muted mb-2" style="font-size: 0.72rem; letter-spacing: 0.5px;">CHANGE EMAIL ADDRESS</div>
                  <div class="small text-muted mb-2">Re-enter your current password above, then confirm the new address from the email we send.</div>
                  <input type="email" class="form-control form-control-sm mb-2" placeholder="new-address@example.com" data-model="preferencesForm.newEmail" autocomplete="email">
                  <button type="button" class="btn btn-sm btn-outline-primary w-100" data-on-click="startEmailChange">Start Email Change</button>
                </div>

                <div class="border rounded p-3 text-start pref-section-card">
                  <div class="d-flex align-items-center justify-content-between mb-2">
                    <div class="small fw-bold text-muted" style="font-size: 0.72rem; letter-spacing: 0.5px;">ACTIVE SESSIONS</div>
                    <button type="button" class="btn btn-sm btn-outline-secondary" data-on-click="revokeOtherSessions">Revoke Other Sessions</button>
                  </div>
                  <for each="sessionList" as="sessionItem" key="sessionItem.id" data-live data-diff="replace">
                    <div class="border rounded p-2 mb-2" style="border-radius: 10px;">
                      <div class="d-flex align-items-center justify-content-between gap-2">
                        <div>
                          <div class="small fw-semibold">
                            <span>${sessionItem.deviceLabel}</span>
                            <if is-truthy="sessionItem.current">
                              <span class="badge bg-primary ms-2">Current</span>
                            </if>
                            <if is-truthy="sessionItem.remembered">
                              <span class="badge bg-secondary ms-2">Remembered</span>
                            </if>
                            <if is-truthy="sessionItem.revoked">
                              <span class="badge bg-danger ms-2">Revoked</span>
                            </if>
                          </div>
                          <div class="small text-muted">IP: ${sessionItem.ipDisplay}</div>
                          <div class="small text-muted text-break">Client: ${sessionItem.clientDisplay}</div>
                          <div class="small text-muted">Created: ${sessionItem.createdAt}</div>
                          <div class="small text-muted">Last used: ${sessionItem.lastUsedAt}</div>
                          <div class="small text-muted">Expires: ${sessionItem.expiresAt}</div>
                        </div>
                        <if is-truthy="sessionItem.canRevoke">
                          <button type="button" class="btn btn-sm btn-outline-danger" data-on-click="revokeSession" data-session-id="${sessionItem.id}">Revoke</button>
                        </if>
                      </div>
                    </div>
                  </for>
                </div>
              </div>
            </if>

            <!-- Modal Action Bar -->
            <div class="d-flex gap-2 mt-4 pt-3 border-top">
              <button class="btn btn-sm btn-outline-secondary flex-grow-1 py-2" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-sm btn-primary flex-grow-1 py-2" data-on-click="savePreferences">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Image Lightbox Overlay (inside the mount root so lime bindings/handlers work) -->
    <div class="lightbox-overlay {lightboxclass}" data-lightboxclass="lightbox.class" id="imageLightbox" data-on-click="closeLightbox">
      <button class="lightbox-close" aria-label="Close image preview"><i class="bi bi-x-lg"></i></button>
      <img src="" alt="Preview" id="lightboxImg">
    </div>
  </template>

  <!-- Toast Notification overlays container -->
  <div class="toast-container-custom" id="toastContainer"></div>

  <!-- ==================================================== -->
  <!-- JAVASCRIPT APPLICATION CODE                          -->
  <!-- ==================================================== -->
  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Emoji Mart Library -->
  <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
  <script type="module" src="/scripts/chat.js"></script>
</body>
</html>
